<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Responsive Design</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Epilogue', sans-serif; }
    </style>
</head>
<body class="bg-white text-[#141414]">
    

    <header class="flex items-center justify-between p-5 md:px-10 md:py-8">
        <div class="text-3xl font-bold lowercase tracking-tight">snap</div>
        
        <button class="p-2 md:hidden">
            <svg width="32" height="18" xmlns="http://www.w3.org/2000/svg">
            </svg>
        </button>

        <nav class="hidden md:flex items-center gap-10 text-[#696969] font-medium ml-14 flex-1">
            <a href="#" class="hover:text-black">Features</a>
            <a href="#" class="hover:text-black">Company</a>
            <a href="#" class="hover:text-black">Careers</a>
            <a href="#" class="hover:text-black">About</a>
        </nav>
        
        <div class="hidden md:flex gap-8 items-center text-[#696969] font-medium">
            <button class="hover:text-black">Login</button>
            <button class="border-2 border-[#696969] px-5 py-2 rounded-xl hover:border-black hover:text-black">Register</button>
        </div>
    </header>

    <main class="flex flex-col md:flex-row-reverse md:items-center md:justify-between md:max-w-6xl md:mx-auto md:mt-10 md:gap-10">
        
        <section class="w-full md:w-[45%] mb-12 md:mb-0">
            <img src="image-hero-mobile.png" alt="hero" class="w-full md:hidden block">
            <img src="image-hero-mobile.png" alt="hero" class="hidden md:block w-full h-auto">
        </section>

        <section class="px-4 text-center md:text-left md:w-[50%] md:px-0">
            <h1 class="text-[36px] font-bold leading-[1.1] mb-5 tracking-tight md:text-[80px] md:mb-10">
                Make <span class="md:block">remote work</span>
            </h1>

            <p class="text-[#696969] text-[16px] leading-relaxed mb-8 px-2 md:px-0 md:text-[18px] md:max-w-[440px] md:mb-12">
                Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar.
            </p>

            <button class="bg-[#141414] text-white px-7 py-4 rounded-2xl font-bold text-lg hover:bg-transparent hover:text-[#141414] border border-[#141414] transition-all duration-300">
                Learn more
            </button>

            <div class="grid grid-cols-4 items-center gap-6 mt-14 mb-10 md:mt-24 md:gap-10 opacity-90">
                <img src="client-databiz.svg" alt="databiz" class="w-full">
                <img src="client-audiophile.svg" alt="audiophile" class="w-full">
                <img src="client-meet.svg" alt="meet" class="w-full">
                <img src="client-maker.svg" alt="maker" class="w-full">
            </div>
        </section>
    </main>

</body>
</html>
