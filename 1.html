<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap Mobile Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Epilogue', sans-serif; }
  </style>
</head>
<body class="bg-white text-[#141414]">

  <header class="flex items-center justify-between p-5 mb-2">
    <div class="text-3xl font-bold lowercase tracking-tighter">snap</div>
    <button class="p-2">
      <svg width="32" height="18" xmlns="image-hero-mobile.png">
        <path d="M0 0h32v2H0zm0 8h32v2H0zm0 8h32v2H0z" fill="#141414" fill-rule="evenodd"/>
      </svg>
    </button>
  </header>

  <main class="flex flex-col">
    
    <section class="w-full mb-12">
      <img 
        src="image-hero-mobile.png" 
        alt="Hero illustration" 
        class="w-full h-auto block"
      >
    </section>

    <section class="px-4 text-center">
      <h1 class="text-[36px] font-bold leading-[1.1] mb-5 tracking-tight">
        Make remote work
      </h1>
      
      <p class="text-[#696969] text-[16px] leading-relaxed mb-8 px-2">
        Get your team in sync, no matter your location. Streamline processes, create team rituals, and watch productivity soar.
      </p>

      <button class="bg-[#141414] text-white px-6 py-4 rounded-2xl font-bold text-lg hover:bg-white hover:text-[#141414] border border-[#141414] transition-all duration-300">
        Learn more
      </button>

      <div class="grid grid-cols-4 items-center gap-4 mt-14 mb-10 opacity-90">
        <img src="client-databiz.svg" alt="databiz" class="w-full h-auto">
        <img src="client-audiophile.svg" alt="audiophile" class="w-full h-auto">
        <img src="client-meet.svg" alt="meet" class="w-full h-auto">
        <img src="client-maker.svg" alt="maker" class="w-full h-auto">
      </div>
    </section>

  </main>

</body>
</html>
